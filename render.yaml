services:
  - type: web
    name: reforge-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: AGENT_MODE
        sync: false
      - key: AGENT_TIMEOUT_SECONDS
        sync: false
      - key: LOG_LEVEL
        sync: false
    healthCheckPath: /health
